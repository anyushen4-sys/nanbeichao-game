<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8dcc8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="inkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1410"/>
      <stop offset="100%" style="stop-color:#4a3e32"/>
    </linearGradient>
    <filter id="inkEffect">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>
  
  <rect width="400" height="600" fill="url(#cardBg)" rx="12"/>
  <rect x="8" y="8" width="384" height="584" fill="none" stroke="#8B6914" stroke-width="2" rx="8"/>
  <rect x="12" y="12" width="376" height="576" fill="none" stroke="#B8A070" stroke-width="0.5" rx="6"/>
  <line x1="40" y1="80" x2="360" y2="80" stroke="#B8A070" stroke-width="1"/>
  
  <!-- 武将名称 -->
  <rect x="60" y="20" width="280" height="50" fill="rgba(184,160,112,0.1)" rx="6"/>
  <text x="200" y="55" text-anchor="middle" fill="#8B1A2B" 
        font-family="'Noto Serif SC','STKaiti',serif" font-size="28" font-weight="bold" 
        letter-spacing="6">骑 将 军</text>
  
  <!-- 兵种标识 -->
  <circle cx="350" cy="45" r="12" fill="#8b1a2b"/>
  <text x="350" y="50" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">骑</text>
  
  <!-- 水墨武将插画 - 骑兵骑马 -->
  <g transform="translate(200, 260)">
    <!-- 水墨晕染背景 -->
    <ellipse cx="0" cy="10" rx="140" ry="170" fill="#1a1410" opacity="0.08" filter="url(#inkEffect)"/>
    
    <!-- 马匹 - 水墨风格 -->
    <!-- 马身 -->
    <path d="M-80,40 Q-60,-20 0,-30 Q60,-20 80,40 Q90,80 70,100 Q50,110 30,100 L30,130 Q30,145 15,145 Q0,145 0,130 L0,100 Q-20,110 -40,100 Q-60,110 -70,100 Q-90,80 -80,40 Z" 
          fill="url(#inkGrad)" opacity="0.85"/>
    
    <!-- 马头 -->
    <ellipse cx="85" cy="-15" rx="35" ry="25" fill="url(#inkGrad)" opacity="0.9"/>
    <!-- 马耳 -->
    <ellipse cx="75" cy="-40" rx="8" ry="12" fill="url(#inkGrad)" transform="rotate(-20,75,-40)"/>
    <ellipse cx="95" cy="-40" rx="8" ry="12" fill="url(#inkGrad)" transform="rotate(20,95,-40)"/>
    <!-- 马眼 -->
    <ellipse cx="95" cy="-20" rx="5" ry="4" fill="#e8dcc8"/>
    <ellipse cx="97" cy="-20" rx="2" ry="3" fill="#1a1410"/>
    <!-- 马鬃 -->
    <path d="M70,-35 Q60,-50 70,-60 Q80,-55 75,-40" fill="url(#inkGrad)" opacity="0.7"/>
    <path d="M75,-30 Q65,-45 75,-55" fill="none" stroke="#1a1410" stroke-width="2" opacity="0.5"/>
    <!-- 马鼻 -->
    <ellipse cx="115" cy="-10" rx="12" ry="8" fill="#1a1410" opacity="0.8"/>
    <!-- 马嘴 -->
    <path d="M110,-5 Q120,5 115,15" fill="none" stroke="#1a1410" stroke-width="2"/>
    
    <!-- 马腿 -->
    <path d="M-20,100 L-20,140 Q-20,150 -10,150 Q0,150 0,140 L0,100" fill="url(#inkGrad)" opacity="0.8"/>
    <path d="M20,100 L20,140 Q20,150 30,150 Q40,150 40,140 L40,100" fill="url(#inkGrad)" opacity="0.8"/>
    <path d="M-50,95 L-55,135 Q-55,145 -45,145 Q-35,145 -35,135 L-35,95" fill="url(#inkGrad)" opacity="0.7"/>
    <path d="M50,95 L55,135 Q55,145 65,145 Q75,145 75,135 L75,95" fill="url(#inkGrad)" opacity="0.7"/>
    
    <!-- 马鞍 -->
    <path d="M-10,-10 Q0,-20 30,-15 Q50,-10 40,0 Q20,10 0,5 Q-20,0 -10,-10 Z" fill="#8b1a2b" opacity="0.9"/>
    <rect x="-20" y="-5" width="60" height="8" fill="#8b1a2b" rx="2"/>
    
    <!-- 骑兵 -->
    <!-- 身体 -->
    <path d="M-25,-50 L-35,30 L35,30 L25,-50 Z" fill="url(#inkGrad)" opacity="0.85"/>
    <!-- 甲片 -->
    <path d="M-25,-35 L25,-35 M-25,-15 L25,-15 M-25,5 L25,5" 
          stroke="#e8dcc8" stroke-width="0.5" opacity="0.3"/>
    
    <!-- 头部 -->
    <ellipse cx="0" cy="-70" rx="25" ry="30" fill="url(#inkGrad)" opacity="0.9"/>
    <!-- 头盔 -->
    <path d="M-22,-75 Q0,-100 22,-75" fill="none" stroke="#1a1410" stroke-width="3"/>
    <circle cx="0" cy="-100" r="10" fill="#1a1410"/>
    <!-- 面 -->
    <ellipse cx="0" cy="-68" rx="18" ry="22" fill="#e8dcc8" opacity="0.9"/>
    <ellipse cx="-7" cy="-73" rx="3.5" ry="3" fill="#1a1410"/>
    <ellipse cx="7" cy="-73" rx="3.5" ry="3" fill="#1a1410"/>
    <path d="M-12,-80 Q-6,-84 0,-79" fill="none" stroke="#1a1410" stroke-width="2"/>
    <path d="M0,-79 Q6,-84 12,-80" fill="none" stroke="#1a1410" stroke-width="2"/>
    
    <!-- 手臂 -->
    <!-- 左手握缰绳 -->
    <path d="M-25,-35 Q-55,-20 -70,0" fill="none" stroke="#1a1410" stroke-width="8" opacity="0.7" stroke-linecap="round"/>
    <!-- 缰绳 -->
    <path d="M-70,0 Q-20,-10 40,-15" fill="none" stroke="#4a3e32" stroke-width="2" opacity="0.6"/>
    <path d="M-70,5 Q-20,-5 40,-10" fill="none" stroke="#4a3e32" stroke-width="1.5" opacity="0.5"/>
    
    <!-- 右手持枪 -->
    <path d="M25,-35 Q55,-15 70,10" fill="none" stroke="#1a1410" stroke-width="8" opacity="0.7" stroke-linecap="round"/>
    <!-- 长枪 -->
    <g transform="translate(75, 15) rotate(25)">
      <rect x="-4" y="0" width="8" height="130" fill="#4a3e32" rx="2"/>
      <polygon points="0,-15 -10,0 0,10 10,0" fill="#B8A070"/>
      <circle cx="0" cy="130" r="5" fill="#4a3e32"/>
    </g>
    
    <!-- 腿部 -->
    <path d="M-15,30 L-20,70 L-10,70 L-5,30 Z" fill="url(#inkGrad)" opacity="0.8"/>
    <path d="M15,30 L20,70 L30,70 L25,30 Z" fill="url(#inkGrad)" opacity="0.8"/>
    
    <!-- 飘带 -->
    <path d="M-30,-50 Q-60,-70 -70,-55 Q-80,-40 -55,-25" fill="none" stroke="#8b1a2b" 
          stroke-width="5" opacity="0.5" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" values="-2;2;-2" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M30,-50 Q60,-60 70,-45 Q80,-30 55,-15" fill="none" stroke="#8b1a2b" 
          stroke-width="4" opacity="0.4" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" values="1;-2;1" dur="4s" repeatCount="indefinite"/>
    </path>
    
    <!-- 马蹄飞扬的尘土 -->
    <circle cx="-10" cy="160" r="8" fill="#4a3e32" opacity="0.15" filter="url(#inkEffect)">
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="165" r="6" fill="#4a3e32" opacity="0.12" filter="url(#inkEffect)">
      <animate attributeName="opacity" values="0.12;0.03;0.12" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- 卡牌底部信息 -->
  <rect x="40" y="500" width="320" height="60" fill="rgba(184,160,112,0.08)" rx="8"/>
  <text x="60" y="525" fill="#8B7050" font-family="'Noto Sans SC',sans-serif" font-size="12" letter-spacing="2">兵种</text>
  <text x="120" y="525" fill="#1a1410" font-family="'Noto Serif SC',serif" font-size="16" font-weight="bold">骑兵</text>
  <text x="60" y="548" fill="#8B7050" font-family="'Noto Sans SC',sans-serif" font-size="12" letter-spacing="2">定位</text>
  <text x="120" y="548" fill="#1a1410" font-family="'Noto Serif SC',serif" font-size="16" font-weight="bold">突击 / 机动</text>
  
  <path d="M20,20 L30,20 L30,30" fill="none" stroke="#B8A070" stroke-width="2"/>
  <path d="M380,20 L370,20 L370,30" fill="none" stroke="#B8A070" stroke-width="2"/>
  <path d="M20,580 L30,580 L30,570" fill="none" stroke="#B8A070" stroke-width="2"/>
  <path d="M380,580 L370,580 L370,570" fill="none" stroke="#B8A070" stroke-width="2"/>
</svg>